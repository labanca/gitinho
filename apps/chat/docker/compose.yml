services:
  chat:
    build:
      context: ../..
      dockerfile: apps/chat/docker/Dockerfile
    ports:
      # Bind apenas em 127.0.0.1 — Easy Panel/reverse-proxy faz o ingress.
      - '127.0.0.1:3000:3000'
    environment:
      - NO_HTTPS=1
    env_file:
      - ../.env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - gitinho
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17
    env_file:
      - ../.env
    # Sem `ports:` — Postgres não é exposto no host.
    networks:
      - gitinho
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-gitinho}']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minio}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-CHANGE_ME_minio_secret}
    ports:
      # API S3 e console — apenas localhost; Easy Panel pode expor o
      # console via reverse-proxy autenticado se quiser admin web.
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    networks:
      - gitinho
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-fSs', 'http://127.0.0.1:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio-bootstrap:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$${AWS_ACCESS_KEY_ID:-minio}\" \"$${AWS_SECRET_ACCESS_KEY:-CHANGE_ME_minio_secret}\";
      mc mb --ignore-existing local/\"$${FILE_STORAGE_S3_BUCKET:-gitinho-uploads}\";
      mc anonymous set none local/\"$${FILE_STORAGE_S3_BUCKET:-gitinho-uploads}\";
      "
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minio}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-CHANGE_ME_minio_secret}
      FILE_STORAGE_S3_BUCKET: ${FILE_STORAGE_S3_BUCKET:-gitinho-uploads}
    networks:
      - gitinho
    restart: 'no'

volumes:
  postgres_data:
  minio_data:

networks:
  gitinho:
    driver: bridge
